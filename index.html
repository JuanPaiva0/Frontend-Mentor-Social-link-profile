<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    :root {
      --background: hsl(0, 0%, 8%);
      --color_card: hsl(0, 0%, 12%);
      --color_button: hsl(0, 0%, 20%);
      --location: hsl(75, 94%, 57%);
      --text: hsl(0, 0%, 100%);
    }

    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      margin: 0;
      padding: 0;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;

      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--text);
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      width: 100%;
      max-width: 20rem;
      padding: 2rem;
      border-radius: 1rem;

      text-align: center;
      background-color: var(--color_card);
    }

    .avatar {
      display: block;
      width: 5rem;
      border-radius: 50%;
      margin-bottom: 1.5rem;
    }

    .name {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
    }

    .location {
      color: var(--location);
      font-size: 1rem;
      font-weight: 600;
      margin: 0.50rem;
    }

    .description {
      font-size: 0.875rem;
      font-weight: 400;
      margin: 0.50rem;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
      width: 100%;
    }

    .social-links a {
      text-decoration: none;
      color: var(--text);
      background-color: var(--color_button);
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-weight: 600;
    }

    .social-links a:hover {
      background-color: var(--location);
      color: var(--background);
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="assets/images/avatar-jessica.jpeg" alt="Jessica Randall" class="avatar">
  
    <h1 class="name">Jessica Randall</h1>
    <p class="location">London, United Kingdom</p>
    <p class="description">"Front-end developer and avid reader."</p>

    <div class="social-links">
      <a href="#">GitHub</a>
      <a href="#">Frontend Mentor</a>
      <a href="#">LinkedIn</a>
      <a href="#">Twitter</a>
      <a href="#">Instagram</a>
    </div>
  </div>
</body>
</html>
